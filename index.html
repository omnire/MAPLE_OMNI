<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- [초보자 가이드] 브라우저가 한글 깨짐 없이 글자를 정확하게 읽을 수 있도록 UTF-8 인코딩을 지정합니다. -->
    <meta charset="UTF-8">
    <!-- [초보자 가이드] 모바일, 태블릿, PC 등 다양한 화면 크기에서도 비율이 자동으로 맞추어지도록 반응형 뷰포트를 설정합니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPLE OMNI V14 - Widescreen Ultimate Premium</title>
    
    <!-- [초보자 가이드] 웹 브라우저 앱처럼 홈 화면에 추가할 수 있도록 설정하는 PWA 마니페스트 파일입니다. -->
    <link rel="manifest" href="manifest.json">
    
    <!-- ============================================================================
     * 🎨 CSS STYLESHEET LINKS (스타일시트 레이어 연결 구역 - 기존 경로 100% 원형 보존)
     * 역할: 각 페이지 및 기능별로 세분화된 디자인 무대를 브라우저에 등록합니다.
     ============================================================================ -->
    <link rel="stylesheet" href="css/style.css"> <!-- 전체 프로젝트 공통 마스터 스타일 -->

    <link rel="stylesheet" href="js/intro/intro.css">         <!-- 시작 인트로 애니메이션 전용 디자인 -->
    <link rel="stylesheet" href="js/dashboard/dashboard.css"> <!-- 메인 홈 현황판 위젯 디자인 -->
    <link rel="stylesheet" href="js/todo/todo.css">           <!-- 일일/주간 숙제 정산판 디자인 -->
    <link rel="stylesheet" href="js/search/basic.css">        <!-- 캐릭터 조회 기본 장비 레이아웃 -->
    <link rel="stylesheet" href="js/search/search.css">       <!-- 종합 캐릭터 검색 명세 디자인 -->
    <link rel="stylesheet" href="js/search/search_skill.css"> <!-- 헥사 스킬 트리 및 코어 디자인 -->
    <link rel="stylesheet" href="js/search/search_union.css"> <!-- 유니온 공격대 격자 맵 디자인 -->
    <link rel="stylesheet" href="js/scanner/scanner.css">     <!-- 스캐너 라이벌 스펙 대조 디자인 -->
    <link rel="stylesheet" href="js/builder/builder.css">     <!-- 가상 스탯 시뮬레이션 보드 디자인 -->
    <link rel="stylesheet" href="js/hunt/hunt.css">           <!-- 사냥/재획 전체 베이스 구조 CSS -->
    <link rel="stylesheet" href="js/hunt/record.css">         <!-- 실시간 세션 레코더/인풋 디자인 -->
    <link rel="stylesheet" href="js/hunt/history.css">        <!-- 달력 통합 기록지 및 타임라인 CSS -->
    <link rel="stylesheet" href="js/hunt/analysis.css">      <!-- 성장 트렌드 차트 및 환산 월급 디자인 -->
    <link rel="stylesheet" href="js/mvp/mvp.css">             <!-- MVP 등급 달성 실시간 트래커 CSS -->
    
    <!-- [초보자 가이드] 통계 데이터 및 사냥 성장 곡선을 미려한 그래프로 그리기 위한 글로벌 Chart.js 외부 라이브러리입니다. -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- ============================================================================
     * 🌐 GLOBAL HEADER NAVIGATION (상단 고정 관제 네비게이션 바)
     * 역할: 로고 디스플레이, 전역 유저 검색, 메인 대메뉴 라우팅 스위치 거치
     ============================================================================ -->
    <header class="omni-top-nav">
        <!-- 네비게이션 좌측: 서비스 메인 브랜드 타이틀 로고 -->
        <div class="nav-brand">MAPLE <span>OMNI</span></div>
        
        <!-- 네비게이션 중앙: 어떤 페이지에 있든 즉시 캐릭터를 검색할 수 있는 글로벌 입력창 -->
        <div class="search-container">
            <span>🔍</span>
            <!-- [초보자 가이드] 닉네임을 적고 엔터키(Enter)를 치면 자동으로 startOmniSearch 기능이 발동됩니다. -->
            <input type="text" id="globalSearchInput" placeholder="캐릭터명 검색 후 엔터" onkeypress="if(event.key === 'Enter') startOmniSearch(this.value);">
        </div>
        
        <!-- 네비게이션 우측: 단일 페이지 어플리케이션(SPA) 구동을 위한 탭 메뉴 스위치 단추 배열 -->
        <nav class="nav-menu">
            <button id="nav-btn-dashboard" onclick="omniSwitchPage('page-dashboard')" class="nav-btn active">홈/대시보드</button>
            <button id="nav-btn-todo" onclick="omniSwitchPage('page-todo')" class="nav-btn">주간 할일</button>
            <button id="nav-btn-search" onclick="omniSwitchPage('page-search')" class="nav-btn">캐릭터 조회</button>
            <button id="nav-btn-scanner" onclick="omniSwitchPage('page-scanner')" class="nav-btn">옴니스캐너</button>
            <button id="nav-btn-builder" onclick="omniSwitchPage('page-builder')" class="nav-btn">옴니빌더</button>
            <button id="nav-btn-hunt" onclick="omniSwitchPage('page-hunt')" class="nav-btn">사냥/재획</button>
            <button id="nav-btn-mvp" onclick="omniSwitchPage('page-mvp')" class="nav-btn">MVP 계산기</button>
        </nav>
    </header>

    <!-- ============================================================================
     * 🖥️ MAIN WIDESCREEN FRAME (와이드스크린 2열 메인 레이아웃 프레임)
     * 구조: [좌측 고정 사이드바(시스템 상태안내)] + [우측 가변 뷰포트(콘텐츠 영역)]
     ============================================================================ -->
    <div class="omni-widescreen-frame">
        
        <!-- [1열] 좌측 사이드바 구역: 시스템 핵심 규격 공지 및 캐릭터 상태 카드가 주입될 자리 -->
        <aside class="omni-widescreen-sidebar" id="characterCardContainer">
            <div class="system-interface-sidebar" style="width: 100%; display: flex; flex-direction: column; gap: 16px;">
                <div class="interface-header" style="font-size: 11px; font-weight: 900; color: #64748b; letter-spacing: 1.5px; padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;">SYSTEM INTERFACE</div>
                
                <!-- OpenAPI 트래픽 부하 안정 가이드 안내 패널 -->
                <div class="core-regulation" style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px;">
                    <div class="regulation-title" style="font-size: 11px; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 6px;">
                        <span style="color: #0f766e;">⚙️</span> OMNI CORE REGULATION
                    </div>
                    <p class="regulation-desc" style="margin: 0; font-size: 11px; color: #475569; line-height: 1.5; word-break: keep-all;">
                        본 관제 콘솔은 넥슨 OpenAPI 아키텍처의 실시간 파싱 부하 규정을 준수하며 안전 필터 모드로 작동 중입니다.
                    </p>
                    
                    <!-- 내부 연동 서브 시스템 보안 및 트래킹 인디케이터 상태 바 -->
                    <div class="status-grid" style="display: flex; flex-direction: column; gap: 6px; border-top: 1px dashed #cbd5e1; padding-top: 10px; margin-top: 4px;">
                        <div class="status-item" style="display: flex; justify-content: space-between; align-items: center; font-size: 10.5px;">
                            <span class="label" style="color: #64748b; font-weight: 700;">파싱 동기화 레벨</span>
                            <span class="value normal" style="color: #0f766e; font-weight: 800; background: #f0fdf4; padding: 1px 6px; border-radius: 4px;">NORMAL SYSTEM</span>
                        </div>
                        <div class="status-item" style="display: flex; justify-content: space-between; align-items: center; font-size: 10.5px;">
                            <span class="label" style="color: #64748b; font-weight: 700;">보안 인프라 규격</span>
                            <span class="value secure" style="color: #2563eb; font-weight: 800; background: #eff6ff; padding: 1px 6px; border-radius: 4px;">SECURE SSL</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- [2열] 우측 메인 콘텐츠 뷰포트 구역: 대메뉴 버튼에 따라 서브 섹션들이 유연하게 교체됩니다. -->
        <main class="omni-widescreen-viewport">
            
            <!-- ───────── [SECTION 1: 홈/대시보드] ───────── -->
            <section id="page-dashboard" class="page-section active">
                <!-- [초보자 가이드] dashboard.js가 가동되면 이 div 스페이스 내부에 헤더와 통계 스택 컴포넌트가 자동 드로잉됩니다. -->
                <div id="dashboardWidgets"></div>
            </section>

            <!-- ───────── [SECTION 2: 주간 숙제 및 할일 관리 - 완전 동적 리얼 타임 빌더 체제 전환] ───────── -->
            <section id="page-todo" class="page-section">
                <!-- 💡 교정 안내: index.html에 종속되었던 하위 div 그릇과 고정 헤더들을 전면 소각했습니다. -->
                <!-- 이제 router.js 가 화면을 완전 청소하더라도 todo.js가 100% 자체 독자 인젝션을 실행하여 충돌을 영원히 방어합니다. -->
            </section>

            <!-- ───────── [SECTION 3: 캐릭터 스펙 상세 조회] ───────── -->
            <section id="page-search" class="page-section">
                <div class="page-header" style="border-left: 4px solid #7c3aed; padding-left: 15px; margin-bottom: 25px;"><h2 style="margin: 0; font-size: 20px; font-weight: 900; color: #1e293b; letter-spacing: -0.5px;">캐릭터 스펙 다차원 상세 분석</h2></div>
                <!-- 장비 스펙, 6차 전직 헥사코어 스킬, 유니온 대형 블록 배치 관리 탭 -->
                <div class="sub-tab-menu">
                    <button onclick="switchSearchTab('basic')" class="tab-btn active">💎 장비 및 내실</button>
                    <button onclick="switchSearchTab('skill')" class="tab-btn">⚡ 헥사 및 스킬</button>
                    <button onclick="switchSearchTab('union')" class="tab-btn">🎖️ 유니온 및 업적</button>
                </div>
                <div id="search-basic" class="sub-section active"></div>
                <div id="search-skill" class="sub-section"></div>
                <div id="search-union" class="sub-section"></div>
            </section>

            <!-- ───────── [SECTION 4: 옴니스캐너 전투력 대조] ───────── -->
            <section id="page-scanner" class="page-section">
                <div class="page-header" style="border-left: 4px solid #7c3aed; padding-left: 15px; margin-bottom: 25px;"><h2 style="margin: 0; font-size: 20px; font-weight: 900; color: #1e293b; letter-spacing: -0.5px;">옴니스캐너 라이벌 매칭 시스템</h2></div>
                <div id="scannerContent"></div>
            </section>

            <!-- ───────── [SECTION 5: 옴니빌더 가상 시뮬레이터] ───────── -->
            <section id="page-builder" class="page-section">
                <div class="page-header" style="border-left: 4px solid #7c3aed; padding-left: 15px; margin-bottom: 25px;"><h2 style="margin: 0; font-size: 20px; font-weight: 900; color: #1e293b; letter-spacing: -0.5px;">옴니빌더 가상 스탯 시뮬레이터</h2></div>
                <div id="builderContent"></div>
            </section>

            <!-- ───────── [SECTION 6: 사냥 및 재획 관제 콘솔] ───────── -->
            <section id="page-hunt" class="page-section">
                <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #7c3aed; padding-left: 15px; margin-bottom: 25px;">
                    <h2 style="margin: 0; font-size: 20px; font-weight: 900; color: #1e293b; letter-spacing: -0.5px;">사냥 및 재획 통합 관리 콘솔</h2>
                    <!-- PWA 연동 간편 타이머 팝업 전환 토글 스위치 -->
                    <button onclick="toggleMiniTimerMode();" class="mini-mode-toggle-btn">⏱️ PWA 간편 미니 타이머 모드 전환</button>
                </div>
                <!-- 평소에는 숨겨져 있다가 미니모드 발동 시 나타나는 거치 프레임 -->
                <div id="miniTimerContainer" class="mini-timer-panel hidden"></div>
                
                <!-- 사냥 내부 서브 가우징 서브 탭 (실시간 기입, 달력 종합 원장, 성장 그래프) -->
                <div class="sub-tab-menu">
                    <button onclick="switchHuntTab('record')" class="tab-btn active">✍️ 사냥 기록하기</button>
                    <button onclick="switchHuntTab('history')" class="tab-btn">📜 통합 기록지</button>
                    <button onclick="switchHuntTab('analysis')" class="tab-btn">📈 누적 성장분석 리포트</button>
                </div>
                <div id="hunt-record" class="sub-section active"></div>
                <div id="hunt-history" class="sub-section"></div>
                <div id="hunt-analysis" class="sub-section">
                    <!-- 사냥 획득 데이터 트렌드 그래픽 렌더 스페이스 (Chart.js 연동 거치대) -->
                    <div class="analysis-chart-container"><canvas id="omniGrowthChart"></canvas></div>
                </div>
            </section>

            <!-- ───────── [SECTION 7: MVP 손익 계산 센터] ───────── -->
            <section id="page-mvp" class="page-section">
                <div class="page-header" style="border-left: 4px solid #7c3aed; padding-left: 15px; margin-bottom: 25px;"><h2 style="margin: 0; font-size: 20px; font-weight: 900; color: #1e293b; letter-spacing: -0.5px;">MVP 등급 손익 비율 트래킹 센터</h2></div>
                <div id="mvpContent"></div>
            </section>

            <!-- ============================================================================
             * 🧠 INTERCEPTOR CONTROLLER SCRIPT (검색 제어 및 화면 튕김 방어 인터셉터)
             ============================================================================ -->
            <script>
            (function() {
                let isOmniSearchingNow = false;

                document.addEventListener('DOMContentLoaded', () => {
                    if (typeof window.startOmniSearch === 'function') {
                        const originalStartOmniSearch = window.startOmniSearch;
                        window.startOmniSearch = function(characterName) {
                            isOmniSearchingNow = true; 
                            originalStartOmniSearch(characterName);
                            setTimeout(() => {
                                isOmniSearchingNow = false;
                            }, 1000);
                        };
                    }

                    if (typeof window.omniSwitchPage === 'function') {
                        const originalOmniSwitchPage = window.omniSwitchPage;
                        window.omniSwitchPage = function(pageId) {
                            if (isOmniSearchingNow && pageId === 'page-search') {
                                const currentActivePage = document.querySelector('.page-section.active');
                                if (currentActivePage && currentActivePage.id !== 'page-search') {
                                    isOmniSearchingNow = false; 
                                    return; 
                                }
                            }
                            originalOmniSwitchPage(pageId);
                        };
                    }
                });
            })();
            </script>
        </main>
    </div>

    <!-- ============================================================================
     * 📦 SYSTEM MASTER JAVASCRIPT LOGIC PLUGINS (백엔드 코어 스크립트 결착 구역 - 기존 파일 링크 100% 원형 보존)
     ============================================================================ -->
    <script src="js/core/data.js"></script>       <!-- 전역 스토리지 영구 보관 캐싱 DB 관리자 -->
    <script src="js/core/api.js"></script>        <!-- 넥슨 오픈 API 비동기 게이트웨이 파서 -->
    <script src="js/core/router.js"></script>     <!-- 전체 시스템 메인 라우터 관제 엔진 -->
    <script src="js/dashboard/dashboard.js"></script> <!-- 실시간 대시보드 연산 및 연동 스크립트 -->
    <script src="js/todo/todo.js"></script>       <!-- 주간/일일 숙제 토글 체크 및 메소 정산 스크립트 -->
    <script src="js/search/basic.js"></script>    <!-- 스펙 수치 연산 및 아이템 명세 바인더 -->
    <script src="js/search/search.js"></script>   <!-- 캐릭터 종합 프로필 데이터 로더 -->
    <script src="js/search/search_skill.js"></script> <!-- 오리진 스킬 및 코어 장착 레벨 빌더 -->
    <script src="js/search/search_union.js"></script> <!-- 유니온 등급 계산 및 누적 전투력 동기화 -->
    <script src="js/scanner/scanner.js"></script>   <!-- 스펙 비교 매칭 알고리즘 구동 모듈 -->
    <script src="js/builder/builder.js"></script>   <!-- 하이퍼스탯, 가상 템셋 시뮬레이터 로직 -->
    
    <!-- 🏹 사냥 및 재획용 컴포넌트 스택: 베이스 관리자부터 상세 기능 컴포넌트까지 계층 순서 보존 -->
    <script src="js/hunt/hunt.js"></script>       <!-- 전역 환경 설정, 타이머 관제, 레이아웃 빌더 -->
    <script src="js/hunt/record.js"></script>     <!-- 실시간 수 harvest 연산 및 임시 회차 캐시 축적 엔진 -->
    <script src="js/hunt/history.js"></script>    <!-- 영구 원장 최종 마스터 전송 및 달력 캘린더 생성기 -->
    <script src="js/hunt/analysis.js"></script>   <!-- 이달의 누적 환산 월급, 치킨/커피 수치 연산기 -->
    
    <script src="js/mvp/mvp.js"></script>         <!-- 경매장 가치 계산 및 로얄 스타일 묶음 패키지 연산기 -->
    <script src="js/intro/intro.js"></script>     <!-- 첫 로딩 시 표출되는 프리미엄 콘솔 웰컴 이펙트 -->
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(err) { 
                console.log("ServiceWorker 엔진 초기 버퍼 캐싱 완료"); 
            });
        }
    </script>
</body>
</html>
